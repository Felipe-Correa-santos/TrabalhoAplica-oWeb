<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link id="themeStylesheet" rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <h1 id="titulo">Contato</h1>
    <button id="botaoTema" type="button">Ativar modo escuro</button>
    <p>Entre em contato comigo através dos seguintes canais e deixe suas impressões:</p>
    <form id="formContato">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="4" cols="50" required></textarea><br><br>
        
        <input type="submit" value="Enviar">
    </form>
    <p id="mensagemSucesso" style="display:none; margin-top: 10px;"></p>
    <br>
    <button id="sobreButton" onclick="window.location.href='index.html'">Voltar</button>
 
    <script src="../javascript/tema.js"></script>
    <script src="../javascript/contato.js"></script>
</body>
</html>
